# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/ycyw_dev}
spring.datasource.username=${DATABASE_USERNAME:ycyw}
spring.datasource.password=${DATABASE_PASSWORD:dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server (port 8081 car le port 8080 est utilisé)
server.port=8081

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# App
app.frontend-url=${FRONTEND_URL:http://localhost:4200}
