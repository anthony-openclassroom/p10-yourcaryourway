# Charge les variables depuis backend/.env en local (ignoré si absent, ex: Docker injecte les vars directement)
spring.config.import=optional:file:.env[.properties]

# Profil actif par défaut, 
# surchargeable via variable d'environnement SPRING_PROFILES_ACTIVE (ex: Docker)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server (port 8081 car le port 8080 est déjà utilisé chez moi)
server.port=8081

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# App
app.frontend-url=${FRONTEND_URL}
