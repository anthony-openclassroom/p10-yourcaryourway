services:
  postgres:
    image: postgres:16-alpine
    container_name: ycyw_postgres
    environment:
      POSTGRES_DB: ycyw_dev
      POSTGRES_USER: ycyw
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-dev_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ycyw -d ycyw_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
